; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitc-02]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200
lib_deps = 
	robtillaart/MAX30205 @ ^0.1.2
	jaikulk14/AdvancedOximeter @ ^1.0.0
	sparkfun/SparkFun BMI270 Arduino Library @ ^1.0.3
	boschsensortec/BME68x Sensor library @ ^1.1.40106
	Wire
	boschsensortec/bsec2 @ ^1.10.2610
	sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
	kosme/arduinoFFT@^2.0.4
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-L .pio/libdeps/esp32-c3-devkitc-02/bsec2/src/riscv32-esp-elf
	-lalgobsec
lib_archive = no
